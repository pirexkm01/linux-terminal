<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Linux Terminal</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: monospace;
  color: #00ff00;
  overflow: hidden;
}

/* green glow background */
.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(0,255,0,0.12), black);
  animation: pulse 5s infinite;
}

@keyframes pulse {
  0% {opacity: 0.3;}
  50% {opacity: 0.7;}
  100% {opacity: 0.3;}
}

#terminal {
  position: relative;
  padding: 15px;
  height: 100vh;
  overflow-y: auto;
}

input {
  background: transparent;
  border: none;
  outline: none;
  color: #00ff00;
  font-family: monospace;
  width: 80%;
}
</style>
</head>

<body>

<div class="bg"></div>

<div id="terminal"></div>

<script src="app.js"></script>

</body>
</html>
